<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JS System Design Practice</title>
  <meta name="description" content="System design practice questions covering general system design, React design patterns, frontend system design, and backend system design — with difficulty ratings." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <h1>🧩 System Design Practice</h1>
      <p class="tagline">System design, React patterns, and frontend &amp; backend design — the top-tier topics for 2026.</p>
    </div>
  </header>

  <nav class="menu" id="menu" role="tablist" aria-label="Question categories">
    <div class="wrap">
      <button class="tab active" role="tab" data-cat="System Design">System Design</button>
      <button class="tab" role="tab" data-cat="React Patterns">React Patterns</button>
      <button class="tab" role="tab" data-cat="Frontend System Design">Frontend System Design</button>
      <button class="tab" role="tab" data-cat="Backend System Design">Backend System Design</button>
    </div>
  </nav>

  <main class="wrap">
    <section class="controls">
      <input id="search" type="search" placeholder="Search questions, tags…" aria-label="Search questions" />
      <div class="filters" id="filters" role="group" aria-label="Filter by difficulty">
        <button class="chip active" data-diff="All">All</button>
        <button class="chip" data-diff="Easy">Easy</button>
        <button class="chip" data-diff="Medium">Medium</button>
        <button class="chip" data-diff="Hard">Hard</button>
      </div>
    </section>

    <p id="count" class="count"></p>
    <section id="list" class="list"></section>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>Built for practice • Add new questions in <code>questions.js</code></p>
    </div>
  </footer>

  <script src="questions.js?v=3"></script>
  <script src="app.js?v=3"></script>
</body>
</html>
